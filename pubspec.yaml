name: info_hotel
description: "Hotel information kiosk application, built with Flutter"
publish_to: 'none'
version: 1.3.0+24

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests for AEMET API
  http: ^1.2.0
  
  # State management
  provider: ^6.1.0
  
  # Internationalization
  intl: ^0.20.2
  
  # PDF viewing
  pdfx: ^2.8.0
  
  # Cupertino icons (needed by transitive dependencies)
  cupertino_icons: ^1.0.6
  
  # Package info
  package_info_plus: ^8.0.2
  
  # YAML parsing for data files
  yaml: ^3.1.0
  qr_flutter: ^4.1.0
  window_manager: ^0.5.1
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  
  # ZIP extraction for GTFS bus data
  archive: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - hotel_assets/data/
    - hotel_assets/images/
    - hotel_assets/images/background/
    - hotel_assets/images/excursions/
    - hotel_assets/images/excursions/ex_ibiza/
    - hotel_assets/images/facilities/
    - assets/images/flags/
    - assets/images/icons/
    - hotel_assets/images/information/
    - hotel_assets/images/logo/
    - hotel_assets/images/beaches/
    - hotel_assets/images/maps/
    - hotel_assets/images/markets/
    - hotel_assets/images/shows/
    - hotel_assets/images/shows/old/
    - assets/images/weather/
    - assets/images/weather/sky_states/
    - assets/images/weather/wind/
    - hotel_assets/pdf/
    - hotel_assets/pdf/excursions/

dependency_overrides:
  pdfx:
    path: packages/pdfx
