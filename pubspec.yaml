name: info_hotel
description: "Hotel information kiosk application for Ses Savines Arenal tourist complex"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests for AEMET API
  http: ^1.2.0
  
  # State management
  provider: ^6.1.0
  
  # Internationalization
  intl: ^0.20.2
  
  # PDF viewing
  pdfx: ^2.8.0
  
  # YAML parsing for data files
  yaml: ^3.1.0
  qr_flutter: ^4.1.0
  window_manager: ^0.5.1
  path_provider: ^2.1.5
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  pdfx:
    path: packages/pdfx
